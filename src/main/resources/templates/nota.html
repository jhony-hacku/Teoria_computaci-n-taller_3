<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Notas</title>
    <meta name="description" content="Administra las calificaciones del estudiante">
    <link rel="stylesheet" href="/css/nota.css">
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Gestión de Notas</h1>
            <p>Administra las calificaciones del estudiante</p>
        </div>

        <div class="content">
            <!-- Info del estudiante (cargada por nota.js) -->
            <div id="estudianteInfo"></div>

            <!-- Botón agregar nota -->
            <div class="top-actions">
                <h3>Lista de Notas</h3>
                <button id="btnAgregarNota" class="btn btn-primary" onclick="showNotaForm()">+ Agregar Nota</button>
            </div>

            <!-- Formulario crear/editar nota -->
            <div id="notaFormContainer" class="nota-form">
                <h2 id="formTitle">Agregar Nota</h2>
                <form id="notaForm">
                    <input type="hidden" id="notaId">
                    <div class="form-group">
                        <label for="materia">Materia:</label>
                        <input type="text" id="materia" name="materia" placeholder="Nombre de la materia" required>
                    </div>
                    <div class="form-group">
                        <label for="observacion">Observación:</label>
                        <input type="text" id="observacion" name="observacion" placeholder="Observación (opcional)">
                    </div>
                    <div class="form-group">
                        <label for="valor">Nota (0-5):</label>
                        <input type="number" id="valor" name="valor" min="0" max="5" step="0.1" placeholder="Ej: 4.5"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="porcentaje">Porcentaje (0-100):</label>
                        <input type="number" id="porcentaje" name="porcentaje" min="0" max="100" step="0.1"
                            placeholder="Ej: 30" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <button type="button" class="btn btn-cancel" onclick="hideNotaForm()">Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- Tabla de notas -->
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Materia</th>
                        <th>Observación</th>
                        <th>Nota</th>
                        <th>Porcentaje</th>
                        <th>Contribución</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="notasList">
                </tbody>
            </table>

            <!-- Resumen de calificaciones -->
            <div id="resumen" class="resumen"></div>
        </div>
    </div>

    <!-- Modal nota final -->
    <div id="notaFinalModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeNotaFinalModal()">&times;</span>
            <div id="notaFinalResult"></div>
        </div>
    </div>

    <script src="/js/nota.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Notas</title>
    <meta name="description" content="Administra las calificaciones del estudiante">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #1a5276;
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
        }

        .header p {
            margin-top: 5px;
            opacity: 0.8;
        }

        .content {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            background: #1a5276;
            color: white;
            margin-right: 6px;
        }

        .button:hover {
            background: #154360;
        }

        .btn-primary {
            background: #1a5276;
            color: white;
        }

        .btn-primary:hover {
            background: #154360;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
            margin-right: 4px;
        }

        .btn-edit:hover {
            background: #e67e22;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            margin-left: 8px;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
        }

        /* Info estudiante */
        #estudianteInfo {
            background: #eaf4fb;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
        }

        #estudianteInfo h2 {
            margin-bottom: 8px;
            font-size: 1.2rem;
            color: #1a5276;
        }

        #estudianteInfo p {
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* Form notas */
        .nota-form {
            display: none;
            background: #ecf0f1;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .nota-form.active {
            display: block;
        }

        .nota-form h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-actions {
            margin-top: 15px;
        }

        /* Top actions */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Table */
        h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .table th,
        .table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        .table th {
            background: #1a5276;
            color: white;
        }

        .table tr:hover {
            background: #f9f9f9;
        }

        .action-buttons {
            display: flex;
            gap: 4px;
        }

        /* Resumen */
        .resumen {
            background: #eaf4fb;
            border-radius: 6px;
            padding: 16px;
            margin-top: 10px;
        }

        .resumen h3 {
            margin-bottom: 10px;
            color: #1a5276;
        }

        .resumen p {
            margin-bottom: 6px;
            font-size: 14px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
            color: #666;
        }

        .close:hover {
            color: #000;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Gestión de Notas</h1>
            <p>Administra las calificaciones del estudiante</p>
        </div>

        <div class="content">
            <!-- Info del estudiante (cargada por nota.js) -->
            <div id="estudianteInfo"></div>

            <!-- Botón agregar nota -->
            <div class="top-actions">
                <h3>Lista de Notas</h3>
                <button id="btnAgregarNota" class="btn btn-primary" onclick="showNotaForm()">+ Agregar Nota</button>
            </div>

            <!-- Formulario crear/editar nota -->
            <div id="notaFormContainer" class="nota-form">
                <h2 id="formTitle">Agregar Nota</h2>
                <form id="notaForm">
                    <input type="hidden" id="notaId">
                    <div class="form-group">
                        <label for="materia">Materia:</label>
                        <input type="text" id="materia" name="materia" placeholder="Nombre de la materia" required>
                    </div>
                    <div class="form-group">
                        <label for="observacion">Observación:</label>
                        <input type="text" id="observacion" name="observacion" placeholder="Observación (opcional)">
                    </div>
                    <div class="form-group">
                        <label for="valor">Nota (0-5):</label>
                        <input type="number" id="valor" name="valor" min="0" max="5" step="0.1" placeholder="Ej: 4.5"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="porcentaje">Porcentaje (0-100):</label>
                        <input type="number" id="porcentaje" name="porcentaje" min="0" max="100" step="0.1"
                            placeholder="Ej: 30" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <button type="button" class="btn btn-cancel" onclick="hideNotaForm()">Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- Tabla de notas -->
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Materia</th>
                        <th>Observación</th>
                        <th>Nota</th>
                        <th>Porcentaje</th>
                        <th>Contribución</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="notasList">
                </tbody>
            </table>

            <!-- Resumen de calificaciones -->
            <div id="resumen" class="resumen"></div>
        </div>
    </div>

    <!-- Modal nota final -->
    <div id="notaFinalModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeNotaFinalModal()">&times;</span>
            <div id="notaFinalResult"></div>
        </div>
    </div>

    <script src="/js/nota.js"></script>
</body>

</html>
